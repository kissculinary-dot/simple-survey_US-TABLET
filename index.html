<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Feedback</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

/* Body - Fullscreen Kiosk Layout */
body {
  margin: 0;
  font-family: 'Montserrat', Arial, sans-serif;
  background: #f8fafc;
  color: #333;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* Header */
.header {
  margin-top: 70px;
}

.header h2 {
  font-size: 54px;
  font-weight: 700;
  margin: 0;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #222;
}

.header h1 {
  font-size: 40px;
  margin-top: 20px;
  font-weight: 500;
  color: #555;
}

/* Options Section */
.options {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 160px;
}

/* Feedback Buttons */
.circle {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  border: none;
  font-size: 52px;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 20px 55px rgba(0,0,0,0.18);
  background: #ffffff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #333;
}

.circle span {
  margin-top: 20px;
  font-size: 28px;
  font-weight: 600;
}

.circle:hover {
  transform: scale(1.07);
  box-shadow: 0 28px 70px rgba(0,0,0,0.22);
}

.circle:active {
  transform: scale(0.95);
}

.selected {
  background-color: #e0f7ff;
}

/* Smaller Submission Popup */
#submissionPopup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.7);
  background: white;
  padding: 30px 55px;
  font-size: 22px;
  font-weight: 600;
  border-radius: 14px;
  box-shadow: 0 18px 45px rgba(0,0,0,0.18);
  opacity: 0;
  pointer-events: none;
  color: #007acc;
}

/* Soft Smaller Bounce Animation */
@keyframes softBounce {
  0%   { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
  40%  { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
  70%  { transform: translate(-50%, -50%) scale(0.97); }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

#submissionPopup.showPopup {
  animation: softBounce 0.45s ease forwards;
}
</style>
</head>

<body>

<div class="header">
  <h2 id="mealHeader">KISS Culinary</h2>
  <h1>How was your meal experience?</h1>
</div>

<div class="options">
  <button class="circle" data-value="Loved it">
    ❤️
    <span>Loved it</span>
  </button>

  <button class="circle" data-value="Needs Improvement">
    ⚠️
    <span>Needs Improvement</span>
  </button>
</div>

<div id="submissionPopup">Thank you for your submission</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLCSIUkSFwn2DaryNYcE3rGE6-QcbXnSV0zsuf7mgE5FMluvSZXXsgUKMU2G2pRv1T/exec";

// Determine meal based on time
function getCurrentMeal() {
  const now = new Date();
  const totalMinutes = now.getHours() * 60 + now.getMinutes();

  const breakfastStart = 7 * 60;
  const breakfastEnd = 11 * 60 + 59;

  const americanStart = 12 * 60;
  const americanEnd = 17 * 60 + 29;

  const dinnerStart = 17 * 60 + 30;
  const dinnerEnd = 21 * 60;

  if (totalMinutes >= breakfastStart && totalMinutes <= breakfastEnd) {
    return "Breakfast";
  } 
  else if (totalMinutes >= americanStart && totalMinutes <= americanEnd) {
    return "American Menu";
  } 
  else if (totalMinutes >= dinnerStart && totalMinutes <= dinnerEnd) {
    return "Dinner";
  } 
  else {
    return "Closed";
  }
}

// Update header automatically
function setMealHeader() {
  const header = document.getElementById("mealHeader");
  const meal = getCurrentMeal();
  header.textContent = meal === "Closed" ? "KISS Culinary" : meal;
}

setMealHeader();
setInterval(setMealHeader, 60000);

// Handle button clicks
document.querySelectorAll(".circle").forEach(button => {
  button.addEventListener("click", function () {

    const mealType = getCurrentMeal();
    if (mealType === "Closed") return;

    const value = this.dataset.value;

    document.querySelectorAll(".circle").forEach(btn => btn.classList.remove("selected"));
    this.classList.add("selected");

    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({
        meal: mealType,
        response: value,
        timestamp: new Date().toISOString()
      })
    });

    const popup = document.getElementById("submissionPopup");
    popup.classList.add("showPopup");

    setTimeout(() => {
      popup.classList.remove("showPopup");
      this.classList.remove("selected");
    }, 2000);
  });
});

</script>

</body>
</html>
